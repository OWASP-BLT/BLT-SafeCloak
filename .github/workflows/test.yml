name: Video Chat E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vendor PeerJS for E2E tests
        run: |
          mkdir -p tests/vendor
          curl -L https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js -o tests/vendor/peerjs.min.js

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run video chat E2E tests
        run: pytest tests/ -v --tb=short
