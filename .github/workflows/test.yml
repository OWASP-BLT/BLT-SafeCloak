name: Video Chat E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PeerJS Server
        run: npm install -g peer@1.0.2

      - name: Vendor PeerJS for E2E tests
        run: |
          mkdir -p tests/vendor
          curl -fL --retry 3 --retry-all-errors \
            https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js \
            -o tests/vendor/peerjs.min.js
          echo "29e6ad48ce4552a35a348dc55ee7a5657db89cf9de229dbc56292d1be35867e8  tests/vendor/peerjs.min.js" > peerjs.sha256
          sha256sum -c peerjs.sha256

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run video chat E2E tests
        run: pytest tests/ -v --tb=short
